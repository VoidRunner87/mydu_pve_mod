name: Build NpcMovementLib

on:
  push:
    paths:
      - 'NpcMovementLib/**'
      - '.github/workflows/build-npc-movement-lib.yml'
  pull_request:
    paths:
      - 'NpcMovementLib/**'
      - '.github/workflows/build-npc-movement-lib.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NpcMovementLib/NpcMovementLib.csproj

      - name: Build
        run: dotnet build NpcMovementLib/NpcMovementLib.csproj --configuration Release --no-restore
